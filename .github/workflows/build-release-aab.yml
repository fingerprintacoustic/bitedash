name: Build Signed Release AAB
on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: chmod +x gradlew
      - run: cp .env.example .env

      - name: Decode upload keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks

      - name: Build signed release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/upload-keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-configuration-cache

      - name: Remove keystore from runner
        if: always()
        run: rm -f upload-keystore.jks

      - uses: actions/upload-artifact@v4
        with:
          name: BiteDash-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
