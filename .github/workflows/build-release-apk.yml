name: Build Debug APK
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: chmod +x gradlew
      - run: cp .env.example .env
      - run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkeypair -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
          fi
      - run: ./gradlew assembleDebug --no-configuration-cache
      - uses: actions/upload-artifact@v4
        with:
          name: BiteDash-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
